name: E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  web-tests:
    name: Selenium Web Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Start Server and Run Web Tests
        run: |
          npm run dev &
          npx wait-on http://127.0.0.1:8080 -t 90000
          npm run test:web
        env:
          CI: true
          PORT: 8080
          TEST_URL: http://127.0.0.1:8080
          VITE_SUPABASE_URL: https://ziutypjgzzayeqwkdnco.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_23qyxTDgqsbRpC7-JaA3DQ_4HtpSNy1

      - name: Upload Web Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-test-reports
          path: e2e-tests/reports/web/*.xlsx
